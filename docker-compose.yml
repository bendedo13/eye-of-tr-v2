services:
  faceseek_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://faceseek_backend:8000
    container_name: faceseek_frontend
    ports:
      - "3002:3000"
    environment:
      - BACKEND_URL=http://faceseek_backend:8000
    depends_on:
      - faceseek_backend
    networks:
      - face_seek_network

  faceseek_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faceseek_backend
    ports:
      - "8003:8000"
    environment:
      - SECRET_KEY=faceseek-production-secret-key-2024-change-in-production
    networks:
      - face_seek_network

networks:
  face_seek_network:
    driver: bridge
